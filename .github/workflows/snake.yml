name: Generate 2025 contribution snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate custom 2025 snake
        run: node .github/scripts/generate-snake-2025.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.SNAKE_TOKEN }}
          GITHUB_USER: VinhTechiee
          CONTRIBUTION_YEAR: "2025"

      - name: Push snake files to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
